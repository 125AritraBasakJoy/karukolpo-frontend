<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Karukolpo | Authentic Bangladeshi Handcrafts</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Discover Karukolpo: Premium Bangladeshi handcrafted heritage products, home decor, and authentic artisan creations. Support local craftsmen and find unique gifts.">
  <meta name="keywords" content="handicrafts, Bangladesh crafts, home decor, artisan products, handmade jewelry, Karukolpo, traditional crafts">
  <link rel="icon" type="image/png" href="assets/KaruKolpo-white-jpg_imresizer.png">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://karukolpo.com/">
  <meta property="og:title" content="Karukolpo | Authentic Bangladeshi Handcrafts">
  <meta property="og:description" content="Premium Bangladeshi handcrafted products and heritage-inspired home decor.">
  <meta property="og:image" content="https://karukolpo.com/assets/landing-bg.webp">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://karukolpo.com/">
  <meta property="twitter:title" content="Karukolpo | Authentic Bangladeshi Handcrafts">
  <meta property="twitter:description" content="Premium Bangladeshi handcrafted products and heritage-inspired home decor.">
  <meta property="twitter:image" content="https://karukolpo.com/assets/landing-bg.webp">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://karukolpo.com/" />

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.karukolpocrafts.com" crossorigin>

  <!-- Preload Critical API Data - Breaks the 5s serial chain -->
  <link rel="preload" as="fetch" href="https://api.karukolpocrafts.com/categories?skip=0&limit=100" crossorigin>
  <link rel="preload" as="fetch" href="https://api.karukolpocrafts.com/products/hot-deals" crossorigin>
  <link rel="preload" as="fetch" href="https://api.karukolpocrafts.com/products/best-sellers" crossorigin>

  <!-- Preload Critical Assets FIRST -->
  <link rel="preload" as="image" href="assets/landing-bg.webp" type="image/webp" fetchpriority="high">
  <link rel="preload" as="font" href="https://fonts.gstatic.com/s/inter/v20/UcCo3FwrK3iLTcviYwY.woff2" type="font/woff2" crossorigin>

  <!-- Inline Critical CSS: Zero-flicker shell -->
  <style>
    :root { --accent-color: #3b82f6; --surface-card: #0f172a; }
    body { margin: 0; background: #020617; font-family: Inter, sans-serif; }
    .header-shell { height: 80px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; padding: 0 1rem; position: sticky; top: 0; z-index: 1000; }
    .hero-shell { position: relative; height: 100vh; min-height: 500px; width: 100%; overflow: hidden; background: #000; }
    .hero-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    .hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 1; }
    .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; text-align: center; color: #fff; width: 100%; }
    .hero-title { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin: 0; line-height: 1.1; }
    .hero-tag { font-size: clamp(1rem, 3vw, 1.25rem); margin-top: 1rem; opacity: 0.9; }
  </style>

  <!-- Non-render-blocking fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet"></noscript>
  
  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Store",
    "name": "Karukolpo",
    "image": "https://karukolpo.com/assets/logo.webp",
    "@id": "https://karukolpo.com",
    "url": "https://karukolpo.com",
    "telephone": "+880XXXXXXXXXX",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Tangail, Bangladesh",
      "addressLocality": "Tangail",
      "addressRegion": "Dhaka",
      "postalCode": "1900",
      "addressCountry": "BD"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": 24.2513,
      "longitude": 89.9231
    },
    "openingHoursSpecification": {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": [
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
        "Sunday"
      ],
      "opens": "00:00",
      "closes": "23:59"
    },
    "sameAs": [
      "https://www.facebook.com/karukolpo",
      "https://www.instagram.com/karukolpobd"
    ]
  }
  </script>
</head>

<body>
  <!-- Static hero shell: painted IMMEDIATELY by the browser, before Angular bootstraps.
       This eliminates the 3.5s Element Render Delay on the LCP image. 
       Angular will replace this content when it mounts. -->
  <app-root>
    <!-- Header Shell -->
    <div class="header-shell">
      <img src="assets/logo.webp" alt="Karukolpo" width="80" height="80" style="object-fit: contain;">
    </div>

    <!-- Hero Shell -->
    <div class="hero-shell">
      <img src="assets/landing-bg.webp" class="hero-image" alt="Karukolpo Official Hero Banner"
           fetchpriority="high" decoding="async" loading="eager">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 class="hero-title">Karukolpo</h1>
        <p class="hero-tag">Authentic Bangladeshi Handcrafts</p>
      </div>
    </div>
  </app-root>
</body>

</html>
